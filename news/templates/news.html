{% extends 'base.html' %}

{% block content %}

<h1 class="text-center mb-4">News</h1>

{% for news in news_list %}
<div class="card mb-3 shadow">
    <div class="row g-0">
        <div class="col-md-12">
            <div class="card-body">
                <h5 class="card-title">{{ news.headline }}</h5>
                <p class="card-text">{{ news.body }}</p>
                <p class="card-text">
                    <small class="text-muted">{{ news.date }}</small>
                </p>
            </div>
        </div>
    </div>
</div>
{% endfor %}

{% endblock content %}
